# Aplikasi stateful Elixir/OTP di Kubernetes. Berisi empat objek:
#   1) Secret    : cookie distribusi BEAM (rahasia bersama agar antar-node bisa saling percaya).
#   2) Service   : Service "headless" untuk penemuan antar-node (libcluster).
#   3) Deployment: pod-pod aplikasi, dengan preStop hook adaptif + readiness/liveness probe.
#   4) PodDisruptionBudget: batas berapa pod boleh terganggu sekaligus.
apiVersion: v1
kind: Secret
metadata:
  name: grace-cookie
  namespace: default
stringData:
  RELEASE_COOKIE: "grace-cluster-cookie"
---
apiVersion: v1
kind: Service
metadata:
  name: grace-headless
  namespace: default
spec:
  clusterIP: None # headless: memberi DNS per-pod untuk distribusi BEAM (bukan satu IP virtual)
  selector:
    app: grace
  ports:
    - name: http
      port: 4000
    - name: epmd
      port: 4369
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grace
  namespace: default
  labels: { app: grace }
spec:
  replicas: 3
  selector:
    matchLabels: { app: grace }
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1 # dipacu (paced) oleh operator
      maxSurge: 1
  template:
    metadata:
      labels: { app: grace }
    spec:
      serviceAccountName: grace
      # grace awal; operator menambalnya agar pas dengan kebutuhan handoff saat runtime
      terminationGracePeriodSeconds: 30
      containers:
        - name: grace
          image: grace:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 4000 }
            - { name: epmd, containerPort: 4369 }
          env:
            - name: GRACE_ROLE
              value: "app"
            # POD_IP diambil dari Downward API; dipakai sebagai nama node BEAM (grace@<POD_IP>).
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: RELEASE_DISTRIBUTION
              value: "name"
            - name: RELEASE_NODE
              value: "grace@$(POD_IP)"
            - name: RELEASE_COOKIE
              valueFrom: { secretKeyRef: { name: grace-cookie, key: RELEASE_COOKIE } }
          # readiness: kapan pod boleh menerima trafik.
          readinessProbe:
            httpGet: { path: /healthz, port: 4000 }
            periodSeconds: 5
          # liveness: jika gagal, kubelet me-restart kontainer.
          livenessProbe:
            httpGet: { path: /healthz, port: 4000 }
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                # tahan terminasi sampai drain adaptif menuntaskan handoff (POST /drain)
                command: ["/bin/sh", "-c", "wget -q -O- --post-data='' http://127.0.0.1:4000/drain || true"]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: grace
  namespace: default
spec:
  maxUnavailable: 1
  selector:
    matchLabels: { app: grace }
