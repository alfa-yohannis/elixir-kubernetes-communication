# Koordinator lintas-lapis. Satu replika membaca /probe tiap pod aplikasi, menghitung grace yang
# memadai, lalu menambal terminationGracePeriodSeconds milik Deployment "grace" (izin di rbac.yaml).
# Memakai IMAGE yang SAMA dengan aplikasi; env GRACE_ROLE=operator yang mengubahnya jadi operator.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grace-operator
  namespace: default
  labels: { app: grace-operator }
spec:
  replicas: 1
  selector:
    matchLabels: { app: grace-operator }
  template:
    metadata:
      labels: { app: grace-operator }
    spec:
      serviceAccountName: grace-operator
      containers:
        - name: operator
          image: grace:dev # image yang sama; GRACE_ROLE menjadikannya operator
          imagePullPolicy: IfNotPresent
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          # Operator tak punya endpoint HTTP, jadi liveness via exec: `bin/grace_convergence pid`
          # keluar non-nol bila VM BEAM mati -> kubelet me-restart pod.
          livenessProbe:
            exec: { command: ["/app/bin/grace_convergence", "pid"] }
            initialDelaySeconds: 20
            periodSeconds: 30
          env:
            - { name: GRACE_ROLE, value: "operator" }
            - { name: GRACE_DEPLOYMENT, value: "grace" }      # Deployment yang ditambal
            - { name: GRACE_SELECTOR, value: "app=grace" }    # selector pod aplikasi
            - { name: GRACE_NAMESPACE, value: "default" }
            - name: RELEASE_COOKIE
              valueFrom: { secretKeyRef: { name: grace-cookie, key: RELEASE_COOKIE } }
