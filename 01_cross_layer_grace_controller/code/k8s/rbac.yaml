# RBAC = Role-Based Access Control: izin "siapa boleh melakukan apa" terhadap API Kubernetes.
# Dua identitas (ServiceAccount) dengan izin paling minimal (least privilege):
#   * "grace"          (aplikasi): hanya boleh membaca pod/endpoint untuk penemuan libcluster.
#   * "grace-operator" (operator): membaca pod DAN menambal (patch) Deployment aplikasi.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grace
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grace-app
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods", "endpoints"]
    verbs: ["get", "list", "watch"] # untuk strategi Kubernetes milik libcluster
---
# RoleBinding mengikat Role ke ServiceAccount (memberikan izinnya).
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grace-app
  namespace: default
subjects:
  - kind: ServiceAccount
    name: grace
roleRef:
  kind: Role
  name: grace-app
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grace-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grace-operator
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"] # inti kontrol lintas-lapis: menambal terminationGracePeriodSeconds
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grace-operator
  namespace: default
subjects:
  - kind: ServiceAccount
    name: grace-operator
roleRef:
  kind: Role
  name: grace-operator
  apiGroup: rbac.authorization.k8s.io
