# RBAC for the app (libcluster pod/endpoint discovery) and the operator (read pods, patch the
# app Deployment's terminationGracePeriodSeconds).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grace
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grace-app
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods", "endpoints"]
    verbs: ["get", "list", "watch"] # libcluster Kubernetes strategy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grace-app
  namespace: default
subjects:
  - kind: ServiceAccount
    name: grace
roleRef:
  kind: Role
  name: grace-app
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grace-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grace-operator
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"] # the cross-layer control: patch terminationGracePeriodSeconds
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grace-operator
  namespace: default
subjects:
  - kind: ServiceAccount
    name: grace-operator
roleRef:
  kind: Role
  name: grace-operator
  apiGroup: rbac.authorization.k8s.io
