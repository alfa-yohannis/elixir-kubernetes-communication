# RBAC hak-paling-kecil (least privilege) untuk pod operator: ia hanya perlu MEMBACA daftar pod
# (untuk men-probe) dan MEMBACA+MENAMBAL PodDisruptionBudget. Pod aplikasi memakai ServiceAccount
# terpisah yang hanya boleh membaca endpoint/pod (untuk libcluster).
---
apiVersion: v1
kind: ServiceAccount
metadata: {name: quorum-operator, namespace: default}
---
apiVersion: v1
kind: ServiceAccount
metadata: {name: quorum-app, namespace: default}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: {name: quorum-operator, namespace: default}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: {name: quorum-app, namespace: default}
rules:
  - apiGroups: [""]
    resources: ["pods", "endpoints"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: {name: quorum-operator, namespace: default}
subjects: [{kind: ServiceAccount, name: quorum-operator, namespace: default}]
roleRef: {kind: Role, name: quorum-operator, apiGroup: rbac.authorization.k8s.io}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: {name: quorum-app, namespace: default}
subjects: [{kind: ServiceAccount, name: quorum-app, namespace: default}]
roleRef: {kind: Role, name: quorum-app, apiGroup: rbac.authorization.k8s.io}
